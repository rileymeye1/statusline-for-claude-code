name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe it below.

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear description of what the problem is.
      placeholder: I'm frustrated when...

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: Any alternative solutions or features you've considered.

  - type: dropdown
    id: scope
    attributes:
      label: Feature Scope
      description: How would you categorize this feature?
      options:
        - Row 1 — prompt (Starship or native)
        - Row 2 — Claude info (model, context, plan, rate limits)
        - New native prompt module
        - Configuration option
        - Installer / setup
        - Cross-platform (bash / PowerShell)
        - Documentation
        - Other

  - type: dropdown
    id: priority
    attributes:
      label: How important is this feature to you?
      description: This helps prioritize.
      options:
        - Critical - I can't use it without this
        - High - Would significantly improve my workflow
        - Medium - Nice to have
        - Low - Just an idea

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or mock-ups about the feature request.

  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      description: Would you be interested in contributing this feature?
      options:
        - label: I'd like to work on this feature myself
